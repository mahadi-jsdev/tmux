# --- General Settings ---
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Keymaps ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind c new-window -c "#{pane_current_path}"
bind , command-prompt -I "#W" "rename-window '%%'"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind r source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"

# --- Theme: WezTerm Ashes ---
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "fg=#c7ccd1,bg=#1c2023"
set -g message-style "fg=#1c2023,bg=#aec795"
set -g message-command-style "fg=#1c2023,bg=#95aec7"
set -g mode-style "fg=#1c2023,bg=#95aec7"

set -g pane-border-style "fg=#303437"
set -g pane-active-border-style "fg=#95aec7"
set -g window-style "fg=#c7ccd1,bg=#1c2023"
set -g window-active-style "fg=#c7ccd1,bg=#1c2023"

set -g status-left-length 40
set -g status-left "#[fg=#1c2023,bg=#95aec7,bold] #S #[fg=#95aec7,bg=#1c2023,nobold]"
set -g status-right-length 80
set -g status-right "#[fg=#adb3ba,bg=#1c2023] %H:%M #[fg=#c7ccd1,bg=#272b2e] #H "

setw -g window-status-separator ""
setw -g window-status-style "fg=#adb3ba,bg=#1c2023"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#c7ccd1,bg=#272b2e"
setw -g window-status-current-format " #I:#W "
setw -g window-status-activity-style "fg=#aec795,bg=#1c2023"

# --- Plugins List ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# --- Initialize TPM (KEEP THIS AT THE VERY BOTTOM) ---
run '~/.tmux/plugins/tpm/tpm'
